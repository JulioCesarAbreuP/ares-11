<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-bold border-b border-red-500 pb-2">ARES-11: Tactical Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
        <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
            <h2 class="text-xl mb-4 text-red-400 font-mono">MITRE ATT&CK Status</h2>
            <canvas id="riskChart"></canvas>
        </div>

        <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
            <h2 class="text-xl mb-4 text-green-400 font-mono">Acciones de Defensa (CIS/SC-300)</h2>
            <div id="recommendations" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="remediation-console" class="mt-6 bg-black p-4 rounded font-mono text-xs text-green-500 hidden">
        <p class="mb-2 text-slate-400">// Remediation Code Generated by ARES-11</p>
        <pre id="code-block"></pre>
        <button onclick="copyCode()" class="mt-4 bg-green-600 text-white px-3 py-1 rounded hover:bg-green-500">
            Copiar Script
        </button>
    </div>

    <script>
        // Simulación de carga de datos desde el motor de correlación
        const report = [
            {"control": "SC-300", "issue": "RDP Expuesto", "fix": "Aplicar Conditional Access"}
        ];

        const list = document.getElementById('recommendations');
        report.forEach(item => {
            list.innerHTML += `
                <div class="p-3 bg-slate-700 rounded border-l-4 border-red-500">
                    <p class="font-bold">${item.control}: ${item.issue}</p>
                    <p class="text-sm text-slate-300">${item.fix}</p>
                    <button onclick="showRemediation('${item.issue}')" class="mt-2 bg-green-700 text-white px-2 py-1 rounded hover:bg-green-500">Ver Remediación</button>
                </div>`;
        });

        function showRemediation(issue) {
            const consoleDiv = document.getElementById('remediation-console');
            const code = document.getElementById('code-block');
            consoleDiv.classList.remove('hidden');
            // Simulación de lógica de enforcer.py
            if(issue === 'RDP Expuesto') {
                code.innerText = 'Disable-NetFirewallRule -DisplayName "Remote Desktop - User Mode (TCP-In)"\n\n# az network nsg rule update --resource-group MyRG --nsg-name MyNSG --name AllowRDP --access Deny';
            } else if(issue === 'SNMP v1/v2 Detectado') {
                code.innerText = 'Stop-Service -Name "SNMP"\nSet-Service -Name "SNMP" -StartupType Disabled';
            } else {
                code.innerText = '// No remediation script available.';
            }
        }

        function copyCode() {
            const code = document.getElementById('code-block').innerText;
            navigator.clipboard.writeText(code);
        }
    </script>
</body>
</html>
